    repeat_per_epoch: 8
    dynamic_query_fraction: 0.35
    particle_query_fraction: 0.25
    same_timestep_queries: true
train_sampling:
  queries_per_clip: 1536
  hard_query_ratio: 0.0
  timestep_sampling:
    prob_t_tgt_equals_t_cam: 1.0
loss:
  total: weighted_sum
  xyz_3d:
    enabled: false
  uv_2d:
    enabled: false
  visibility:
    enabled: false
  displacement:
    enabled: false
  normal:
    enabled: false
  confidence:
    enabled: false
  reprojection_uv_from_xyz:
    enabled: false
  transient:
    enabled: true
    geometry_masking:
      enabled: false
    dynamic_object:
      enabled: true
      weight_lambda: 1.0
      metric_threshold: 0.5
    particle:
      enabled: true
      weight_lambda: 1.0
      metric_threshold: 0.5
optimizer:
  type: adamw
  weight_decay: 0.01
  gradient_clip_l2_norm: 1.0
  learning_rate:
    schedule: cosine_decay
    warmup_steps: 50
    peak_lr: 0.0005
    final_lr: 1.0e-05
fine_tuning:
  freeze_encoder: true
  freeze_memory_proj: true
  freeze_query_embedder: true
  freeze_decoder: true
  freeze_heads: false
  log_parameter_counts: true
schedule:
  total_steps: 5000
  local_repro_override:
    enabled: false
checkpoint:
  save_every_steps: 1000
  step_save_every_steps: 0
  keep_last_k: 3
  keep_best_by: val_loss_total
  keep_best_mode: min
  auto_eval_worldtrack_step:
    enabled: false
logging:
  log_every_steps: 10
  validate_every_steps: 250
  validate_max_batches_global: 15
  validate_max_samples_global: 0
  per_dataset_validation:
    enabled: false
  visualization:
    enabled: false
